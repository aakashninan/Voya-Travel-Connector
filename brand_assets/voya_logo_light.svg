<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <!-- Warm Sand Light Background -->
  <rect width="1000" height="1000" fill="#F5EFE0" />
  
  <!-- Waypoint Twist Logo in Center (Scale 8.0, Translate 100) -->
  <g transform="translate(100, 100) scale(8.0)">
    <!-- Gold Waypoint circle precisely at the center intersection -->
    <circle cx="50" cy="62" r="5.5" fill="#D4A843" />
    
    <!-- Terracotta Path (Left Arm and Loop) -->
    <path d="M 32,20 C 32,48 42,68 50,68 C 55,68 56.5,64 54,60 C 51.5,56 45,60 48,65" stroke="#E8824F" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Sage Green Path (Right Arm and Loop) -->
    <path d="M 68,20 C 68,48 58,68 50,68 C 45,68 43.5,64 46,60 C 48.5,56 55,60 52,65" stroke="#7A8C6E" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
